name: Build and save my Docker image to a registry

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'   # Étape 5 → ne se déclenche que si backend change

env:
  REGISTRY: nomduregistre.azurecr.io   # ⚠️ URL complète ACR
  IMAGE_NAME: backend-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login à votre Azure Container Registry
      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USER }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # Build & Push Docker
      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
