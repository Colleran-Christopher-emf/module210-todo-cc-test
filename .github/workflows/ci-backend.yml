name: Build and save my Docker image to a registry
 
on:
  push:
    branches:
      - main
 
env:
  REGISTRY: "acrinfofd21210.azurecr.io"
  IMAGE_NAME: "backend-app-cco"
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USER }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
 
      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -f ./src/backend/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .src/backend
 
      - name: Verify Docker image
        run: |
          docker images
 
      - name: Push Docker image to registry
        run: |
          echo "Pushing Docker image..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
